<!doctype html>
<html lang="en">
<title>Revenge Plugins</title>
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
<link rel="stylesheet" href="{baseurl}/common.css">
<header class="site-header site-header--center">Revenge Plugins</header>
<main class="shell">
    <section class="intro">
        <h1>Installable plugins</h1>
        <p>Copy a plugin URL, then paste it in the Revenge plugins settings.</p>
    </section>
    <section class="plugin-list" aria-label="Plugins">
        <for-each-plugin>
            <button class="card plugin-card" type="button" onclick="copyPluginUrl('{baseurl}/{pluginid}')">
                <span>{pluginname}</span>
                <small>{plugindescription}</small>
            </button>
        </for-each-plugin>
    </section>
    <p id="copy-status" class="status" role="status" aria-live="polite"></p>
    <script>
        async function copyPluginUrl(text) {
            const status = document.getElementById("copy-status");
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                } else {
                    const input = document.createElement("textarea");
                    input.value = text;
                    input.setAttribute("readonly", "");
                    input.style.position = "fixed";
                    input.style.opacity = "0";
                    document.body.appendChild(input);
                    input.select();
                    document.execCommand("copy");
                    document.body.removeChild(input);
                }
                status.textContent = "Copied install URL.";
            } catch {
                status.textContent = text;
            }
        }
    </script>
</main>
</html>
