<!doctype html>
<html lang="en">
<title>{pluginname}</title>
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
<link rel="stylesheet" href="https://fres621.github.io/revenge-plugs/common.css">
<style>:root { --ix: 10%; --ox: -10% }</style>
<header class="site-header">
    <a class="back-link" href="https://fres621.github.io/revenge-plugs/index.html">Back</a>
    <span>{pluginname}</span>
    <span></span>
</header>
<main class="shell">
    <section class="plugin-detail">
        <h1>{pluginname}</h1>
        <p>{plugindescription}</p>
        <button class="copy-button" type="button" onclick="copyPluginUrl('https://fres621.github.io/revenge-plugs/{pluginid}')">Copy install URL</button>
        <p class="hint">Paste this URL in the Revenge plugins settings.</p>
        <p id="copy-status" class="status" role="status" aria-live="polite"></p>
    </section>
    <script>
        async function copyPluginUrl(text) {
            const status = document.getElementById("copy-status");
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                } else {
                    const input = document.createElement("textarea");
                    input.value = text;
                    input.setAttribute("readonly", "");
                    input.style.position = "fixed";
                    input.style.opacity = "0";
                    document.body.appendChild(input);
                    input.select();
                    document.execCommand("copy");
                    document.body.removeChild(input);
                }
                status.textContent = "Copied install URL.";
            } catch {
                status.textContent = text;
            }
        }
    </script>
</main>
</html>
