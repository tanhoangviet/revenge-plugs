name: Build and deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Prepare environment
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install --global pnpm@11.4.0

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Verify and build
        run: pnpm verify

      - name: Check deployment payload
        run: |
          set -euo pipefail

          jq -e --arg sha "$GITHUB_SHA" '.sha == $sha' dist/deployment.json >/dev/null
          test -f dist/FileContentPreview/index.js
          grep -q 'FileContentPreview' dist/FileContentPreview/index.html

      - name: Publish gh-pages branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          deploy_dir="$(mktemp -d)"
          cp -R dist/. "$deploy_dir/"

          git -C "$deploy_dir" init -b gh-pages
          git -C "$deploy_dir" config user.name "github-actions[bot]"
          git -C "$deploy_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$deploy_dir" add -A
          git -C "$deploy_dir" commit -m "Deploy ${GITHUB_SHA}"
          git -C "$deploy_dir" remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"

          auth="$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')"
          git -C "$deploy_dir" -c http.https://github.com/.extraheader="AUTHORIZATION: basic $auth" push --force origin gh-pages
