name: Build and deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Prepare environment
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install --global pnpm@11.4.0

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Verify and build
        run: pnpm verify

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      actions: read
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Deploy GitHub Pages
        id: publish
        uses: actions/deploy-pages@v5

      - name: Verify GitHub Pages is reachable
        env:
          PAGE_URL: ${{ steps.publish.outputs.page_url }}
        run: |
          set -euo pipefail

          root_html="$(curl -fsSL "${PAGE_URL%/}/?run=${GITHUB_RUN_ID}")"
          plugin_html="$(curl -fsSL "${PAGE_URL%/}/FileContentPreview/?run=${GITHUB_RUN_ID}")"
          deployment_json="$(curl -fsSL "${PAGE_URL%/}/deployment.json?run=${GITHUB_RUN_ID}")"

          printf '%s' "$root_html" | grep -q '<title>Revenge Plugins'
          printf '%s' "$plugin_html" | grep -q '<title>FileContentPreview'
          printf '%s' "$deployment_json" | jq -e --arg sha "$GITHUB_SHA" '.sha == $sha' >/dev/null

          echo "GitHub Pages is reachable at ${PAGE_URL}"
